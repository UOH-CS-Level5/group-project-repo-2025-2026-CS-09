name: Push to Windows VM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v2
      - name: Copy to host directory

      run: powershell Copy-Item -Path C:\Windows\System32\actions-runner\_work\* -Destination C:\inetpub\wwwroot -force
